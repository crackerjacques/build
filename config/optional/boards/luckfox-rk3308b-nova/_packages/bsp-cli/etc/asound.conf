# The on-board mic sits on channel 8 of the codec's 8-channel ADC.
pcm.mic {
	type plug
	slave {
		pcm "hw:0,0"
		channels 8
		format S32_LE
	}
	ttable.0.7 1
}

# All 8 ADC channels with the same safe-format plumbing:
#
#   arecord -D mics -r 48000 -f S16_LE -c 8 -d 5 /tmp/t8.wav
pcm.mics {
	type plug
	slave {
		pcm "hw:0,0"
		channels 8
		format S32_LE
	}
}
